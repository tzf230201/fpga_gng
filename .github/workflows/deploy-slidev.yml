name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: slidev/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci
        working-directory: slidev

      - name: Prepare website shell
        run: |
          rm -rf out
          mkdir -p out
          cp -R web/. out/

          if [ -f WEB_VERSION_SCIENTIFIC_STUDY.md ]; then
            cp WEB_VERSION_SCIENTIFIC_STUDY.md out/WEB_VERSION_SCIENTIFIC_STUDY.md
          fi

          if [ -d images ]; then
            mkdir -p out/images
            cp -R images/. out/images/
          fi

          mkdir -p out/WCCI2026_5
          if [ -f WCCI2026_5/main.pdf ]; then cp WCCI2026_5/main.pdf out/WCCI2026_5/main.pdf; fi
          if [ -f WCCI2026_5/poster.pdf ]; then cp WCCI2026_5/poster.pdf out/WCCI2026_5/poster.pdf; fi
          if [ -f "WCCI2026_5/WCCI2026-Poster-A0-Portrait (3).pptx" ]; then cp "WCCI2026_5/WCCI2026-Poster-A0-Portrait (3).pptx" out/WCCI2026_5/wcci2026-poster-a0-portrait.pptx; fi
          if [ -f WCCI2026_5/wcci2026_poster_web_preview.png ]; then cp WCCI2026_5/wcci2026_poster_web_preview.png out/WCCI2026_5/wcci2026_poster_web_preview.png; fi
          if [ -f WCCI2026_5/problem.png ]; then cp WCCI2026_5/problem.png out/WCCI2026_5/problem.png; fi
          if [ -f WCCI2026_5/two_moons_result.png ]; then cp WCCI2026_5/two_moons_result.png out/WCCI2026_5/two_moons_result.png; fi
          if [ -f WCCI2026_5/concentric_circles_result.png ]; then cp WCCI2026_5/concentric_circles_result.png out/WCCI2026_5/concentric_circles_result.png; fi
          if [ -f WCCI2026_5/two_moons_training.png ]; then cp WCCI2026_5/two_moons_training.png out/WCCI2026_5/two_moons_training.png; fi

      - name: Build Slidev
        run: npm run build:gh
        working-directory: slidev

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
